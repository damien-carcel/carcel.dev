version: 3

tasks:
  bash:
    aliases:
      - b
    cmds:
      - docker compose run --rm --build --remove-orphans dev bash
    desc: Launch a shell in the development container

  dev:
    aliases:
      - d
    cmds:
      - docker compose up --build --detach --remove-orphans dev
      - echo "You can access the development server at http://localhost:3000"
    desc: Run the development server with hot reload

  prod:
    aliases:
      - p
    cmds:
      - docker compose up --build --detach --remove-orphans prod
      - echo "You can access the production-like server at http://localhost:8000"
    desc: Run the production-like server

  stop:
    aliases:
      - s
    cmds:
      - docker compose down -v --remove-orphans
    desc: Stop and remove the presentation containers
